name: Python Code Linter

# This tells GitHub to run this script every time you push to the 'main' branch
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest # GitHub gives you a temporary Linux server

    steps:
    # Step 1: Download your code onto the server
    - uses: actions/checkout@v3

    # Step 2: Install Python
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    # Step 3: Install the Linter (flake8)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    # Step 4: Run the Linter on your code
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Treat all other issues as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics